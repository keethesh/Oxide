name: Release Master

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: true

jobs:
  publish-windows:
    name: Publish Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Read release version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          "release_version=v$version" >> $env:GITHUB_OUTPUT

      - name: Build and publish Tauri bundle
        uses: tauri-apps/tauri-action@v0.7.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --no-bundle
          tagName: ${{ steps.version.outputs.release_version }}
          releaseName: Oxide ${{ steps.version.outputs.release_version }}
          releaseBody: |
            Automated portable Windows build from the latest commit on `master`.

            Current SemVer: `${{ steps.version.outputs.release_version }}`
            This release is updated on every push to `master` and publishes the portable executable.
          releaseCommitish: ${{ github.sha }}
          releaseDraft: false
          prerelease: false
          uploadPlainBinary: true
          tauriScript: pnpm tauri
