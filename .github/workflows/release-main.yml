name: Release Master

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: true

jobs:
  publish-windows:
    name: Publish Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Read release version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          "release_version=v$version" >> $env:GITHUB_OUTPUT

      - name: Build Tauri bundle
        run: pnpm tauri build --no-bundle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename binary with version
        id: rename
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $oldName = "src-tauri\target\release\oxide.exe"
          $newName = "src-tauri\target\release\oxide-v$version.exe"
          Move-Item -Path $oldName -Destination $newName
          "binary_path=$newName" >> $env:GITHUB_OUTPUT

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.release_version }}
          name: Oxide ${{ steps.version.outputs.release_version }}
          body: |
            Automated portable Windows build from the latest commit on `master`.

            Current SemVer: `${{ steps.version.outputs.release_version }}`
            This release is updated on every push to `master` and publishes the portable executable.
          draft: false
          prerelease: false
          files: ${{ steps.rename.outputs.binary_path }}
