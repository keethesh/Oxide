name: Release Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: true

jobs:
  publish-windows:
    name: Publish Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute prerelease version
        id: version
        shell: pwsh
        run: |
          $baseVersion = (Get-Content package.json | ConvertFrom-Json).version
          $releaseVersion = "$baseVersion-main.${{ github.run_number }}"
          "base_version=$baseVersion" >> $env:GITHUB_OUTPUT
          "release_version=$releaseVersion" >> $env:GITHUB_OUTPUT

      - name: Sync project version
        run: pnpm sync-version --version ${{ steps.version.outputs.release_version }}

      - name: Build and publish Tauri bundle
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ steps.version.outputs.release_version }}
          releaseName: Oxide v${{ steps.version.outputs.release_version }}
          releaseBody: |
            Automated prerelease build from the latest commit on `main`.

            Base version: `${{ steps.version.outputs.base_version }}`
            Commit: `${{ github.sha }}`
          releaseCommitish: ${{ github.sha }}
          releaseDraft: false
          prerelease: true
